<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="웅천고등학교 교직원을 위한 업무 웹툴 모음" />
    <meta name="theme-color" content="#155eef" />
    <title>웅천고등학교 업무 웹툴 모음</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="#" aria-label="웅천고등학교 업무 웹툴 모음 홈">
          <span class="brand-mark" aria-hidden="true">웅</span>
          <span class="brand-copy">
            <strong>웅천고등학교</strong>
            <span>업무 웹툴 모음</span>
          </span>
        </a>
      </header>

      <main>
        <section class="hero" aria-labelledby="heroTitle">
          <div class="hero-decoration hero-decoration-one" aria-hidden="true"></div>
          <div class="hero-decoration hero-decoration-two" aria-hidden="true"></div>
          <div class="hero-content">
            <p class="eyebrow"><span aria-hidden="true"></span>더 빠르고 간편한 학교 업무</p>
            <h1 id="heroTitle">
              필요한 업무 도구를<br />
              <em>한곳에서</em> 만나보세요
            </h1>
            <p class="hero-description">
              학교 업무에 필요한 도구를 모았습니다.<br class="desktop-break" />
              검색하고 원하는 도구로 바로 이동하세요.
            </p>
          </div>
          <div class="hero-visual" aria-hidden="true">
            <div class="visual-card visual-card-back">
              <span class="mini-icon">W</span><span class="mini-line wide"></span><span class="mini-line"></span>
            </div>
            <div class="visual-card visual-card-main">
              <div class="visual-card-top"><span class="visual-app-icon">W</span></div>
              <span class="visual-title"></span><span class="visual-text"></span>
              <span class="visual-text short"></span><span class="visual-link">바로가기 <b>→</b></span>
            </div>
          </div>
        </section>

        <section class="tools-section" aria-labelledby="toolsTitle">
          <div class="section-heading">
            <div>
              <p class="section-kicker">WORK TOOLS</p>
              <h2 id="toolsTitle">업무 웹툴</h2>
              <p class="tool-count" id="toolCount">등록된 웹툴 0개</p>
            </div>
            <label class="search-box" for="searchInput">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"></circle><path d="m16 16 4 4"></path>
              </svg>
              <span class="sr-only">웹툴 검색</span>
              <input id="searchInput" type="search" placeholder="이름, 설명 또는 부서 검색" autocomplete="off" />
              <kbd>/</kbd>
            </label>
          </div>

          <div class="tools-grid" id="toolsGrid"></div>
          <div class="empty-state" id="emptyState" hidden>
            <h3>검색 결과가 없어요</h3>
            <p>다른 검색어를 입력해보세요.</p>
          </div>
        </section>
      </main>

      <footer><p>© <span id="currentYear"></span> 웅천고등학교 · 더 나은 학교 업무를 위해</p></footer>
    </div>

    <template id="toolCardTemplate">
      <article class="tool-card">
        <div class="card-top">
          <div class="tool-icon" aria-hidden="true"></div>
          <span class="tool-department"></span>
        </div>
        <h3 class="tool-title"></h3>
        <p class="tool-description"></p>
        <a class="tool-link" target="_blank" rel="noopener noreferrer">
          <span>바로가기</span>
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg>
        </a>
      </article>
    </template>
  </body>
</html>
